name: Deploy API Libreria

on:
  push:
    branches:
      - master  # Se dispara cuando subes cambios a la rama master.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore Libreria.sln 

    - name: Build
      run: dotnet build Libreria.sln --configuration Release --no-restore

    - name: Publish API
      # Apuntamos a la carpeta Presentation/API 
      run: dotnet publish src/Presentation/Api/Api.csproj -c Release -o ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'app-libreria-api-prod' 
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish